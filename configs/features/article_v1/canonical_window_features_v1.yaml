  - {feature_id: F027, feature_name: speed_spectral_centroid_hz, channel: rotational_speed_rpm, formula: "sum(f_k*P_k)/sum(P_k)", unit: Hz, domain: frequency, implementation: deterministic_power_weighted_centroid, required_preprocessing: mean_removal_and_periodic_hann, frequency_reference: rfft_bin_frequencies, interpretation: power-weighted speed-variation frequency center, interpretation_evidence_class: EMPIRICALLY_MEASURED, schema_version: "1.0.0"}
